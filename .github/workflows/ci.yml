name: CI

on:
  push:
  pull_request:

jobs:
  ansible:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible audispd-plugins

      - name: Configure Ansible roles path
        run: |
          {
            echo '[defaults]'
            echo 'roles_path = ../'
          } >> ansible.cfg

      - name: Create symlink for role name
        run: ln -s "$GITHUB_WORKSPACE" ../auditd

      - name: Syntax check playbook
        run: ansible-playbook -i tests/inventory tests/test.yml --syntax-check

      - name: Run playbook
        run: ansible-playbook -i tests/inventory tests/test.yml --connection=local --become

      - name: Idempotence test
        run: |
          ansible-playbook -i tests/inventory tests/test.yml --connection=local --become \
            | grep -q 'changed=0.*failed=0' \
            && (echo 'Idempotence test: pass' && exit 0) \
            || (echo 'Idempotence test: fail' && exit 1)
